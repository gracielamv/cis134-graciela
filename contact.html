        <h2>Contact Form</h2>
        
        <div class="form-container">
            <img id="bg-img" src="images/pexels-aaronburden-36692234.jpg" alt="bg-img">
            <form id="contact-form" method="post" name="contact-form" target="_blank"
                action="https://www.w3schools.com/action_page.php">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="firstname">

                <label for="email">Email Address</label>
                <input type="email" id="email-add" name="email">

                <label for="subject">Subject</label>
                <textarea id="subject" name="subject"></textarea>

                <input type="submit" value="Submit">
            </form>
